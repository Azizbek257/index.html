<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
        .header { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .q-text { font-weight: bold; margin-bottom: 10px; color: #333; }
        .options { display: flex; gap: 8px; }
        .opt-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: center; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .opt-btn.active { background-color: #4a69bd; color: white; border-color: #4a69bd; }
        .submit-btn { width: 100%; padding: 16px; background-color: #4a69bd; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0">Testni yechish</h3>
    <p style="font-size: 12px; color: #666; margin: 5px 0 0 0;">Javoblarni tanlang va yakunlash tugmasini bosing</p>
</div>

<div id="quiz-area"></div>

<button class="submit-btn" onclick="yakunlash()">Testni yakunlash</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let answers = {};

    // 10 ta savol chiqarish
    const quizArea = document.getElementById('quiz-area');
    for (let i = 1; i <= 10; i++) {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
            <div class="q-text">${i}-savol</div>
            <div class="options" id="q${i}">
                <div class="opt-btn" onclick="select(${i}, 'A', this)">A</div>
                <div class="opt-btn" onclick="select(${i}, 'B', this)">B</div>
                <div class="opt-btn" onclick="select(${i}, 'C', this)">C</div>
                <div class="opt-btn" onclick="select(${i}, 'D', this)">D</div>
            </div>
        `;
        quizArea.appendChild(card);
    }

    function select(qId, val, el) {
        const parent = document.getElementById('q' + qId);
        parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        answers[qId] = val;
    }

    function yakunlash() {
        if (Object.keys(answers).length < 10) {
            alert("Iltimos, barcha savollarni belgilang!");
            return;
        }
        // Javoblarni botga yuborish
        tg.sendData(JSON.stringify(answers));
        tg.close();
    }
</script>

</body>
</html>
